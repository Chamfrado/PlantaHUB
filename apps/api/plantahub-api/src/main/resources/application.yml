server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/plantahub
    username: plantahub
    password: plantahub
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs

security:
  jwt:
    issuer: plantahub
    secret: "CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_64_CHARS_MIN"
    access-token-minutes: 240

app:
  s3:
    bucket: plantahub-assets
    region: us-east-2
    access-key: ${APP_S3_ACCESS_KEY:}
    secret-key: ${APP_S3_SECRET_KEY:}

logging:
  level:
    org.hibernate.SQL: debug

